################################################################################
# Cloud Build Configuration — CareerPathway
# Alternative to GitHub Actions; triggered via Cloud Build GitHub App
# Substitutions can be set in Cloud Build trigger UI
################################################################################

substitutions:
  _REGION: asia-south1
  _GCP_PROJECT: your-gcp-project-id
  _REGISTRY: asia-south1-docker.pkg.dev
  _REPO: careerpathway
  _FRONTEND_SERVICE: careerpathway-frontend
  _BACKEND_SERVICE: careerpathway-backend

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

steps:
  # ── Build Backend ──────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: build-backend
    args:
      - build
      - --target=production
      - --cache-from=${_REGISTRY}/${_GCP_PROJECT}/${_REPO}/backend:latest
      - -t=${_REGISTRY}/${_GCP_PROJECT}/${_REPO}/backend:$SHORT_SHA
      - -t=${_REGISTRY}/${_GCP_PROJECT}/${_REPO}/backend:latest
      - ./backend
    waitFor: ['-']

  # ── Build Frontend ─────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: build-frontend
    args:
      - build
      - --target=production
      - --cache-from=${_REGISTRY}/${_GCP_PROJECT}/${_REPO}/frontend:latest
      - --build-arg=NEXT_PUBLIC_API_URL=$$NEXT_PUBLIC_API_URL
      - -t=${_REGISTRY}/${_GCP_PROJECT}/${_REPO}/frontend:$SHORT_SHA
      - -t=${_REGISTRY}/${_GCP_PROJECT}/${_REPO}/frontend:latest
      - ./frontend
    secretEnv: ['NEXT_PUBLIC_API_URL']
    waitFor: ['-']

  # ── Push Backend ───────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: push-backend
    args:
      - push
      - --all-tags
      - ${_REGISTRY}/${_GCP_PROJECT}/${_REPO}/backend
    waitFor: ['build-backend']

  # ── Push Frontend ──────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: push-frontend
    args:
      - push
      - --all-tags
      - ${_REGISTRY}/${_GCP_PROJECT}/${_REPO}/frontend
    waitFor: ['build-frontend']

  # ── Deploy Backend to Cloud Run ────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-backend
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_BACKEND_SERVICE}
      - --image=${_REGISTRY}/${_GCP_PROJECT}/${_REPO}/backend:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --memory=1Gi
      - --min-instances=1
      - --max-instances=20
      - --port=4000
      - --set-secrets=DATABASE_URL=careerpathway-db-url:latest,JWT_SECRET=careerpathway-jwt-secret:latest,GEMINI_API_KEY=careerpathway-gemini-key:latest
    waitFor: ['push-backend']

  # ── Deploy Frontend to Cloud Run ───────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-frontend
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_FRONTEND_SERVICE}
      - --image=${_REGISTRY}/${_GCP_PROJECT}/${_REPO}/frontend:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --memory=512Mi
      - --min-instances=0
      - --max-instances=10
      - --port=3000
    waitFor: ['push-frontend', 'deploy-backend']

images:
  - ${_REGISTRY}/${_GCP_PROJECT}/${_REPO}/backend:$SHORT_SHA
  - ${_REGISTRY}/${_GCP_PROJECT}/${_REPO}/backend:latest
  - ${_REGISTRY}/${_GCP_PROJECT}/${_REPO}/frontend:$SHORT_SHA
  - ${_REGISTRY}/${_GCP_PROJECT}/${_REPO}/frontend:latest

availableSecrets:
  secretManager:
    - versionName: projects/${_GCP_PROJECT}/secrets/careerpathway-frontend-api-url/versions/latest
      env: NEXT_PUBLIC_API_URL
