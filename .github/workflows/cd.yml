name: CD — Deploy to GCP Cloud Run

on:
  push:
    branches: [main]

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: asia-south1
  ARTIFACT_REGISTRY: asia-south1-docker.pkg.dev
  BACKEND_IMAGE: asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/careerpathway/backend
  FRONTEND_IMAGE: asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/careerpathway/frontend
  BACKEND_SERVICE: careerpathway-backend
  FRONTEND_SERVICE: careerpathway-frontend

jobs:
  deploy:
    name: Build & Deploy to Cloud Run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # Required for Workload Identity Federation

    steps:
      # ── Checkout ─────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Authenticate with GCP (Workload Identity Federation) ──
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # ── Setup gcloud CLI ──────────────────────────────────
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # ── Configure Docker for Artifact Registry ────────────
      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }} --quiet

      # ── Set image tag ─────────────────────────────────────
      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::8}" >> $GITHUB_ENV

      # ── Build & Push Backend ──────────────────────────────
      - name: Build Backend image
        run: |
          docker build \
            --target production \
            --cache-from ${{ env.BACKEND_IMAGE }}:latest \
            -t ${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }} \
            -t ${{ env.BACKEND_IMAGE }}:latest \
            ./backend

      - name: Push Backend image
        run: |
          docker push ${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.BACKEND_IMAGE }}:latest

      # ── Build & Push Frontend ─────────────────────────────
      - name: Build Frontend image
        run: |
          docker build \
            --target production \
            --cache-from ${{ env.FRONTEND_IMAGE }}:latest \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }} \
            --build-arg NEXT_PUBLIC_APP_NAME=CareerPathway \
            -t ${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }} \
            -t ${{ env.FRONTEND_IMAGE }}:latest \
            ./frontend

      - name: Push Frontend image
        run: |
          docker push ${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.FRONTEND_IMAGE }}:latest

      # ── Deploy Backend to Cloud Run ───────────────────────
      - name: Deploy Backend
        run: |
          gcloud run deploy ${{ env.BACKEND_SERVICE }} \
            --image ${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }} \
            --platform managed \
            --region ${{ env.GCP_REGION }} \
            --allow-unauthenticated \
            --memory 1Gi \
            --cpu 1 \
            --min-instances 1 \
            --max-instances 20 \
            --concurrency 80 \
            --port 4000 \
            --set-secrets="DATABASE_URL=careerpathway-db-url:latest,REDIS_URL=careerpathway-redis-url:latest,JWT_SECRET=careerpathway-jwt-secret:latest,JWT_REFRESH_SECRET=careerpathway-jwt-refresh:latest,GEMINI_API_KEY=careerpathway-gemini-key:latest,SENDGRID_API_KEY=careerpathway-sendgrid-key:latest,RAZORPAY_KEY_SECRET=careerpathway-razorpay-secret:latest" \
            --set-env-vars="NODE_ENV=production,FRONTEND_URL=${{ secrets.FRONTEND_URL }},RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}"

      # ── Run DB Migrations ─────────────────────────────────
      - name: Run DB Migrations
        run: |
          gcloud run jobs create careerpathway-migrate-${{ env.IMAGE_TAG }} \
            --image ${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }} \
            --region ${{ env.GCP_REGION }} \
            --set-secrets="DATABASE_URL=careerpathway-db-url:latest" \
            --command "npx" \
            --args "prisma,migrate,deploy" \
            --max-retries 1 || true
          gcloud run jobs execute careerpathway-migrate-${{ env.IMAGE_TAG }} \
            --region ${{ env.GCP_REGION }} \
            --wait || true

      # ── Get Backend URL ───────────────────────────────────
      - name: Get Backend URL
        id: backend-url
        run: |
          URL=$(gcloud run services describe ${{ env.BACKEND_SERVICE }} \
            --region ${{ env.GCP_REGION }} \
            --format 'value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT

      # ── Deploy Frontend to Cloud Run ──────────────────────
      - name: Deploy Frontend
        run: |
          gcloud run deploy ${{ env.FRONTEND_SERVICE }} \
            --image ${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }} \
            --platform managed \
            --region ${{ env.GCP_REGION }} \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10 \
            --port 3000 \
            --set-env-vars="NEXT_PUBLIC_API_URL=${{ steps.backend-url.outputs.url }},NODE_ENV=production"

      # ── Get Frontend URL ──────────────────────────────────
      - name: Get Frontend URL
        id: frontend-url
        run: |
          URL=$(gcloud run services describe ${{ env.FRONTEND_SERVICE }} \
            --region ${{ env.GCP_REGION }} \
            --format 'value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT

      # ── Deployment Summary ────────────────────────────────
      - name: Deployment Summary
        run: |
          echo "✅ Deployment successful!"
          echo "🌐 Frontend: ${{ steps.frontend-url.outputs.url }}"
          echo "🔌 Backend:  ${{ steps.backend-url.outputs.url }}"
          echo "🏷️  Image Tag: ${{ env.IMAGE_TAG }}"

      # ── Notify on failure ─────────────────────────────────
      - name: Notify on failure
        if: failure()
        run: echo "❌ Deployment failed for commit ${{ github.sha }}"
